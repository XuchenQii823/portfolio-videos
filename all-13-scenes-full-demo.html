<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All 13 Scenes Full Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e8e8e8; font-family: 'Syne', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 24px; }
    .wrap { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 28px; }
    .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #444; }
    h1 { font-size: clamp(18px, 3vw, 28px); font-weight: 300; letter-spacing: 0.04em; line-height: 1.2; color: #e8e8e8; }
    .player { width: 100%; aspect-ratio: 16 / 9; background: #111; border: 1px solid #1e1e1e; overflow: hidden; }
    .player video { width: 100%; height: 100%; display: block; object-fit: contain; }
    .footer { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: #333; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label">Portfolio — Motion Reference</div>
    <h1>All 13 Scenes Full Demo</h1>
    <div class="player">
      <video controls preload="metadata" src="https://raw.githubusercontent.com/XuchenQii823/portfolio-videos/main/All%2013%20Scenes%20Full%20Demo.mp4"></video>
    </div>
    <div class="footer">For recruitment use only — not for redistribution</div>
  </div>
</body>
</html>
